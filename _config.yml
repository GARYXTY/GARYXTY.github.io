# ============================================================
# STEP 1: Your Identity (required)
# ============================================================
name: "Tianyu Xiang"
title: "Postdoctoral Researcher"
institution: "Penn State Neuromechanics Laboratory, The Pennsylvania State University"
email: xiangtianyu1999@gmail.com
photo: xty.png

# ============================================================
# STEP 2: Your Links (optional -- delete any you don't use)
# ============================================================
links:
  google_scholar: "https://scholar.google.com/citations?user=S3oniHQAAAAJ&hl=en"
  github: "https://github.com/GARYXTY"
  researchgate: ""
  orcid: "https://orcid.org/0000-0002-0967-0823"
  twitter: "https://x.com/garyxty"
  linkedin: "https://www.linkedin.com/in/tianyu-xiang-28409839b/"
  cv: ""  # e.g., "papers/cv.pdf" — leave blank to hide the CV icon

# ============================================================
# STEP 3: Site Settings
# ============================================================
accent_color: "#174f87"      # theme color for links and buttons
dark_mode: true              # show dark mode toggle in navbar
description: "Academic website of Tianyu Xiang — multimodal human manipulation modeling, online neural decoding, and brain-inspired human–robot skill transfer."
baseurl: ""
url: "https://garyxty.github.io"

# Google Analytics — paste your GA4 measurement ID, or leave blank
analytics:
  google_id: ""

# ============================================================
# STEP 4: Choose Your Pages (comment out any you don't need)
# ============================================================
nav_pages:
  - name: about
  - name: publications
  - name: research
  - name: awards
  - name: cv
    label: CV

# ============================================================
# Advanced Settings (you probably don't need to change these)
# ============================================================
include:
  - .htaccess
  - _pages

sass:
  quiet_deps: true
  style: compressed

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

plugins: ["jekyll-sitemap"]

exclude:
  - Gemfile
  - Gemfile.lock
  - update_bootstrap.sh
  - switch_theme.sh
  - tags
  - Rakefile
  - node_modules
  - package.json
  - package-lock.json
  - docs
